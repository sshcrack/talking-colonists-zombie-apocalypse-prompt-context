modLoader = "javafml"
loaderVersion = "*"
issueTrackerURL = "https://github.com/meza/Stonecraft/issues"
license = "GPL-3.0"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "Meza"
description = '''
${description}
'''
logoFile = "assets/${id}/icon.png"
logoBlur = false

[[dependencies.${id}]]
modId = "minecraft"
mandatory = true
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${id}]]
modId = "forge"
mandatory = true
versionRange = "*"
ordering = "NONE"
side = "CLIENT"
[[dependencies.${id}]]
modId = "mc_talking"
mandatory = true
versionRange = "[${mc_talking_version},)"
ordering = "BEFORE"
side = "BOTH"
